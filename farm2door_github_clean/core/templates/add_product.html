{% extends 'base.html' %}

{% block content %}
<section class="auth-page">
    <form class="auth-card" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <p class="eyebrow">Produit</p>
        <h1>Ajouter un produit</h1>

        <label for="name">Nom du produit</label>
        <input id="name" type="text" name="name" required>

        <label for="price">Prix en DH</label>
        <input id="price" type="number" name="price" min="0" step="0.01" required>

        <label for="stock">Stock disponible</label>
        <input id="stock" type="number" name="stock" min="0" required>

        <label for="image">Image</label>
        <input id="image" type="file" name="image" accept="image/*">

        <button class="btn primary full" type="submit">Publier le produit</button>
        <a class="btn secondary full" href="{% url 'dashboard' %}">Retour</a>
    </form>
</section>
{% endblock %}
