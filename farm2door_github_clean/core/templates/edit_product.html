{% extends 'base.html' %}

{% block content %}
<section class="auth-page">
    <form class="auth-card" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <p class="eyebrow">Produit</p>
        <h1>Modifier {{ product.name }}</h1>

        <label for="name">Nom du produit</label>
        <input id="name" type="text" name="name" value="{{ product.name }}" required>

        <label for="price">Prix en DH</label>
        <input id="price" type="number" name="price" min="0" step="0.01" value="{{ product.price }}" required>

        <label for="stock">Stock disponible</label>
        <input id="stock" type="number" name="stock" min="0" value="{{ product.stock }}" required>

        <label for="image">Nouvelle image</label>
        <input id="image" type="file" name="image" accept="image/*">

        <button class="btn primary full" type="submit">Enregistrer</button>
        <a class="btn secondary full" href="{% url 'dashboard' %}">Annuler</a>
    </form>
</section>
{% endblock %}
